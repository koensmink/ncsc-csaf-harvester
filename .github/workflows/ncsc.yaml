name: NCSC Harvester + Notifier

on:
  schedule:
    # Ma-Vr elk uur op :05
    - cron: "5 * * * 1-5"
    # Za-Zo om 23:55
    - cron: "55 23 * * 6,0"
  workflow_dispatch:

concurrency:
  group: ncsc-harvester-main
  cancel-in-progress: true

jobs:
  run-and-notify:
    runs-on: self-hosted
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- Scraper (jouw bestaande script) ---
      - name: Run scraper
        run: |
          python scraper.py

      # --- Notifier (idempotent + batched + debounce) ---
      - name: Run notifier
        id: notify
        run: |
          python ncsc_notify.py --cooldown-minutes 30

      - name: Show notifier outputs
        run: |
          echo "filtered_count=${{ steps.notify.outputs.filtered_count }}"
          echo "unsent_count=${{ steps.notify.outputs.unsent_count }}"
          echo "sent_count=${{ steps.notify.outputs.sent_count }}"
          echo "message_hash=${{ steps.notify.outputs.message_hash }}"

      # --- Commit state (alleen als gewijzigd) ---
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add output/sent_cache.json output/last_run.json || true
          git diff --cached --quiet || git commit -m "Update sent/last_run state [skip ci]"
          git push || true
